name: "CodeMap"
description: "Generate per-project architecture graphs for pull requests"
inputs:
  include:
    description: "Comma-separated relative path prefixes to include"
    required: false
    default: ""
  exclude:
    description: "Comma-separated relative path prefixes to exclude"
    required: false
    default: ""
  config:
    description: "Optional config path for project root overrides"
    required: false
    default: ""
  output-dir:
    description: "Output directory for manifest, graphs, and viewer"
    required: false
    default: "codemap-out"
  max-files:
    description: "Maximum files per detected project"
    required: false
    default: "2000"
outputs:
  project-count:
    description: "Detected project count"
    value: ${{ steps.summary.outputs.project_count }}
  graph-count:
    description: "Generated graph count"
    value: ${{ steps.summary.outputs.graph_count }}
  artifact-path:
    description: "Artifact directory path"
    value: ${{ steps.summary.outputs.artifact_path }}
runs:
  using: "composite"
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - id: changed
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD | paste -sd "," - > /tmp/codemap-changed.txt
        else
          : > /tmp/codemap-changed.txt
        fi

    - id: analyze
      shell: bash
      run: |
        CHANGED_FILES="$(cat /tmp/codemap-changed.txt)"
        CONFIG_ARGS=()
        if [[ -n "${{ inputs.config }}" ]]; then
          CONFIG_ARGS+=(--config "${{ inputs.config }}")
        fi
        go run ./cmd/codemap analyze \
          --repo . \
          --out "${{ inputs.output-dir }}" \
          --include "${{ inputs.include }}" \
          --exclude "${{ inputs.exclude }}" \
          --changed-files "${CHANGED_FILES}" \
          --max-files "${{ inputs.max-files }}" \
          "${CONFIG_ARGS[@]}"

    - uses: actions/upload-artifact@v4
      with:
        name: codemap-artifact
        path: ${{ inputs.output-dir }}

    - id: summary
      shell: bash
      run: |
        PROJECT_COUNT="$(python3 - <<'PY'
import json
with open("${{ inputs.output-dir }}/summary.json") as fh:
    print(json.load(fh)["projectCount"])
PY
)"
        GRAPH_COUNT="$(python3 - <<'PY'
import json
with open("${{ inputs.output-dir }}/summary.json") as fh:
    print(json.load(fh)["graphCount"])
PY
)"
        {
          echo "project_count=${PROJECT_COUNT}"
          echo "graph_count=${GRAPH_COUNT}"
          echo "artifact_path=${{ inputs.output-dir }}"
        } >> "$GITHUB_OUTPUT"

    - uses: actions/github-script@v7
      if: ${{ github.event_name == 'pull_request' }}
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('${{ inputs.output-dir }}/summary.md', 'utf8');
          const marker = '<!-- codemap-comment -->';
          const body = `${marker}\n${summary}\n\nArtifact: \`${{ inputs.output-dir }}/viewer/index.html\``;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
          });
          const existing = comments.find((comment) => comment.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }
